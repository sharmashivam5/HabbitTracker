<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Habit Tracker</title>

<style>
body {
  font-family: -apple-system;
  background: #0f172a;
  color: white;
  padding: 16px;
  margin: 0;
}

h1 {
  text-align: center;
  font-size: 22px;
}

#date {
  text-align: center;
  margin-bottom: 10px;
  color: #94a3b8;
}

/* HABITS */
.habit {
  display: flex;
  justify-content: space-between;
  padding: 14px;
  margin: 6px 0;
  background: #1e293b;
  border-radius: 12px;
}

button {
  background: #334155;
  border: none;
  color: white;
  padding: 6px 14px;
  border-radius: 8px;
}

.done {
  background: #22c55e !important;
}

#score {
  text-align: center;
  margin: 15px 0;
  font-size: 20px;
}

/* CALENDAR GRID */
#calendar {
  margin-top: 20px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  height: 38px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

.today {
  border: 2px solid white;
}

.green { background: #22c55e; }
.yellow { background: #eab308; }
.red { background: #ef4444; }
.empty { background: #1e293b; }

</style>
</head>

<body>

<h1>Daily Habit Tracker</h1>
<div id="date"></div>

<div id="list"></div>
<div id="score"></div>

<h3>Monthly Progress</h3>
<div id="calendar"></div>

<script>
const habits = [
"Leetcode","Apply to Jobs","Studied","Workout","Kaggle",
"Protein Shake","Diet","No W","No P","Screen Time",
"Meditation","Sleep On Time"
];

let history = JSON.parse(localStorage.getItem("history")) || {};
let selectedDate = getTodayKey();

function getTodayKey() {
  return new Date().toISOString().split("T")[0];
}

function getDateKey(date) {
  return date.toISOString().split("T")[0];
}

function isEditable(dateKey) {
  const today = new Date();
  const selected = new Date(dateKey);

  const diff = (today - selected) / (1000 * 60 * 60 * 24);
  return diff <= 1; // only today & yesterday editable
}

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  const state = history[selectedDate] || {};

  let count = 0;

  habits.forEach(h => {
    const done = state[h];

    if(done) count++;

    const div = document.createElement("div");
    div.className = "habit";

    const btn = document.createElement("button");
    btn.innerText = done ? "Done" : "Mark";
    if(done) btn.classList.add("done");

    if(isEditable(selectedDate)) {
      btn.onclick = () => {
        if(!history[selectedDate]) history[selectedDate] = {};
        history[selectedDate][h] = !history[selectedDate][h];
        localStorage.setItem("history", JSON.stringify(history));
        render();
      };
    } else {
      btn.disabled = true;
      btn.style.opacity = 0.5;
    }

    div.innerHTML = `<span>${h}</span>`;
    div.appendChild(btn);
    list.appendChild(div);
  });

  document.getElementById("score").innerText =
    `Score: ${count}/${habits.length}`;

  renderCalendar();
}

function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "calendar-grid";

  const today = getTodayKey();

  for(let i = 1; i <= 31; i++) {
    const date = new Date();
    date.setDate(i);

    const key = getDateKey(date);
    const state = history[key] || {};
    const score = Object.values(state).filter(v => v).length;

    const div = document.createElement("div");
    div.classList.add("day");

    if(key === today) div.classList.add("today");
    if(key === selectedDate) div.style.border = "2px solid #38bdf8";

    if(score > 0) {
      if(score >= 9) div.classList.add("green");
      else if(score >= 5) div.classList.add("yellow");
      else div.classList.add("red");
    } else {
      div.classList.add("empty");
    }

    div.innerText = i;

    div.onclick = () => {
      selectedDate = key;
      render();
    };

    grid.appendChild(div);
  }

  cal.appendChild(grid);
}

document.getElementById("date").innerText = new Date().toDateString();

render();
</script>

</body>
</html>
