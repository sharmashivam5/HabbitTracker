<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Habit Tracker</title>

<style>
body {
  font-family: -apple-system;
  background: #0f172a;
  color: white;
  padding: 16px;
  margin: 0;
}

h1 {
  text-align: center;
  font-size: 22px;
}

#date {
  text-align: center;
  margin-bottom: 10px;
  color: #94a3b8;
}

/* HABITS */
.habit {
  display: flex;
  justify-content: space-between;
  padding: 14px;
  margin: 6px 0;
  background: #1e293b;
  border-radius: 12px;
}

button {
  background: #334155;
  border: none;
  color: white;
  padding: 6px 14px;
  border-radius: 8px;
}

.done {
  background: #22c55e !important;
}

#score {
  text-align: center;
  margin: 15px 0;
  font-size: 20px;
}

/* CALENDAR GRID */
#calendar {
  margin-top: 20px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  height: 38px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

.today {
  border: 2px solid white;
}

.green { background: #22c55e; }
.yellow { background: #eab308; }
.red { background: #ef4444; }
.empty { background: #1e293b; }

</style>
</head>

<body>

<h1>Daily Habit Tracker</h1>
<div id="date"></div>

<div id="list"></div>
<div id="score"></div>

<h3>Monthly Progress</h3>
<div id="calendar"></div>

<script>
const habits = [
"Leetcode","Apply to Jobs","Studied","Workout","Kaggle",
"Protein Shake","Diet","No Weed","No Porn","Screen Time",
"Meditation","Sleep On Time"
];

let state = JSON.parse(localStorage.getItem("habits")) || {};
let history = JSON.parse(localStorage.getItem("history")) || {};

function formatDate(date) {
  return date.toDateString();
}

function getTodayKey() {
  return new Date().toISOString().split("T")[0];
}

// Show today's date
document.getElementById("date").innerText = formatDate(new Date());

function render() {
  const list = document.getElementById("list");
  list.innerHTML = "";

  let count = 0;

  habits.forEach(h => {
    const done = state[h];

    if(done) count++;

    const div = document.createElement("div");
    div.className = "habit";

    const btn = document.createElement("button");
    btn.innerText = done ? "Done" : "Mark";
    if(done) btn.classList.add("done");

    btn.onclick = () => {
      state[h] = !state[h];
      localStorage.setItem("habits", JSON.stringify(state));
      render();
    };

    div.innerHTML = `<span>${h}</span>`;
    div.appendChild(btn);
    list.appendChild(div);
  });

  document.getElementById("score").innerText =
    `Score: ${count}/${habits.length}`;

  // Save today's score
  history[getTodayKey()] = count;
  localStorage.setItem("history", JSON.stringify(history));

  renderCalendar();
}

function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const grid = document.createElement("div");
  grid.className = "calendar-grid";

  const today = getTodayKey();

  for(let i = 1; i <= 31; i++) {
    const date = new Date();
    date.setDate(i);

    const key = date.toISOString().split("T")[0];
    const score = history[key];

    const div = document.createElement("div");
    div.classList.add("day");

    if(key === today) div.classList.add("today");

    if(score !== undefined) {
      if(score >= 9) div.classList.add("green");
      else if(score >= 5) div.classList.add("yellow");
      else div.classList.add("red");
      div.innerText = i;
    } else {
      div.classList.add("empty");
      div.innerText = i;
    }

    grid.appendChild(div);
  }

  cal.appendChild(grid);
}

render();
</script>

</body>
</html>
